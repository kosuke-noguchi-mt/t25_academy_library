<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div class="mb30 flexarea">
                            <span>
                                <p>＊は必須項目です<p></p> <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                            
                                <p>書籍名<p>
                                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="POST">
                                    <input type="text" name='title' th:field="*{title}" placeholder="書籍名を入力"><br><br>
                                    <div class="error_msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                    <p>ISBN<p>
                                        <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="POST"></form>
                                        <input type="text" name='isbn' th:field="*{isbn}"placeholder="ISBN"><br><br>
                                        <div class="error_msg" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                                    <p>
                                        <input type="submit" value="保存">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
